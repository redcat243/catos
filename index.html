<!DOCTYPE html>
<html>
  <head>
    <title>Welcome to catos</title>
    <style>
      /* Reset page defaults to handle full-height layout */
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: sans-serif;
      }

      /* Flexbox layout to split content between center and bottom */
      body {
        display: flex;
        flex-direction: column;
        justify-content: space-between; 
        box-sizing: border-box;
        padding: 40px 20px;
        background-color: #f8f9fa; /* Light, clean background color */
      }

      /* Keeps your header, text, and button grouped and centered */
      .main-content {
        text-align: center;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center; 
        align-items: center;
      }

      /* Turns your link into a clean, modern dark gray button */
      .button {
        display: inline-block;
        background-color: #24292e; 
        color: white;
        text-decoration: none;
        padding: 12px 24px;
        border-radius: 6px;
        font-weight: bold;
        font-size: 16px;
        margin-top: 20px;
        transition: background-color 0.2s;
      }

      .button:hover {
        background-color: #444d56;
      }

      /* Bottom Footer: Branding and Copyright formatting */
      .footer-branding {
        text-align: center;
        color: #6a737d; /* Soft gray for footer text */
        font-size: 13px;
        margin-top: auto; 
        line-height: 1.5;
      }
    </style>
  </head>
  <body>

    <!-- Main Section: Stays in the middle of the screen -->
    <div class="main-content">
      <h1>welcome to catos (im sorry if this page looks bad)</h1>
      <p>catos is a funny thing for your terminal that can run the commands listed and regular zsh commands</p>
      <a href="https://github.com" class="button">Download Now!</a>
    </div>

    <!-- Bottom Section: Branding & Copyright info -->
    <footer class="footer-branding">
      <p>&copy; 2026 onemeow inc. All Wrongs Reserved.</p>
    </footer>

  </body>
</html>
